name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build package
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Sync server.json version to release tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish || true
      - name: Commit server.json version sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json
          if git diff --staged --quiet; then echo "no changes to sync"; exit 0; fi
          git commit -m "chore: sync server.json to ${GITHUB_REF_NAME} [skip ci]"
          # This job + npm-publish + the monorepo release-sync all push to main;
          # rebase-retry to avoid 'fetch first' / 'cannot lock ref' races.
          for i in 1 2 3 4 5 6; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              echo "synced on attempt $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 6 + 3))
          done
          echo "server.json sync push failed after 6 attempts" >&2; exit 1

  npm-publish:
    needs: publish
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Sync npm/package.json version to release tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm --prefix npm pkg set version="$VERSION"
      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --no-provenance
      - name: Commit npm/package.json version sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add npm/package.json
          if git diff --staged --quiet; then echo "no changes to sync"; exit 0; fi
          git commit -m "chore: sync npm/package.json to ${GITHUB_REF_NAME} [skip ci]"
          # Races with the server.json sync + monorepo release-sync; rebase-retry.
          for i in 1 2 3 4 5 6; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              echo "synced on attempt $i"; exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 6 + 3))
          done
          echo "npm/package.json sync push failed after 6 attempts" >&2; exit 1
