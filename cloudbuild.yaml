steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/dali-mcp:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/dali-mcp:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/dali-mcp:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/dali-mcp:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dali-mcp
      - --image=gcr.io/$PROJECT_ID/dali-mcp:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest,DALI_SUPABASE_URL=dali-supabase-url:latest,DALI_SUPABASE_SERVICE_KEY=dali-supabase-service-key:latest

images:
  - gcr.io/$PROJECT_ID/dali-mcp:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/dali-mcp:latest
